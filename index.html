<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票价差监控</title>
    <script src="echarts.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', 'Microsoft YaHei', sans-serif; }
        body { background-color: #f5f7fa; padding: 15px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; }

        /* 登出按钮样式 */
        .logout-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 8px 15px;
            background: #f56c6c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
            font-size: 14px;
        }
        .logout-btn:hover {
            background: #f78989;
        }

        /* 响应式布局 - 媒体查询 */
        @media (max-width: 768px) {
            .logout-btn {
                top: 10px;
                right: 10px;
                padding: 6px 12px;
                font-size: 12px;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .config-item {
                min-width: 100%;
            }
            
            .stocks-section {
                grid-template-columns: 1fr;
            }
            
            .chart-container {
                padding: 15px;
            }
            
            .chart-canvas {
                height: 300px;
            }
            
            .stats-container {
                flex-direction: column;
                gap: 10px;
            }
            
            .stat-item {
                margin-bottom: 10px;
            }
        }
        
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .header {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 20px;
                padding-top: 10px;
            }
            
            .logout-btn {
                position: relative;
                top: 0;
                right: 0;
                display: block;
                margin: 10px auto;
                width: 80%;
            }
            
            .update-time {
                font-size: 12px;
            }
            
            .index-name, .index-price, .index-change {
                font-size: 14px;
            }
            
            .config-section {
                padding: 15px;
            }
            
            .config-item label {
                font-size: 16px;
            }
            
            .save-btn {
                width: 90%;
            }
            
            .stock-name {
                font-size: 16px;
            }
            
            .stock-price {
                font-size: 24px;
            }
            
            .stock-change {
                font-size: 18px;
            }
        }

        /* 大盘指数区域 - 清晰简单的响应式布局 */
        .index-section {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            display: grid;
            /* 默认桌面布局：4列2行（上四下四） */
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        /* 平板布局：3列3行（最后一个位置可能为空） */
        @media (max-width: 992px) {
            .index-section {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        /* 手机横向布局：2列4行（两列四行） */
        @media (max-width: 768px) {
            .index-section {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        /* 手机竖向布局：1列8行（单列） */
        @media (max-width: 480px) {
            .index-section {
                grid-template-columns: 1fr;
            }
        }
        
        .index-item {
            padding: 10px;
            text-align: center;
            border-radius: 6px;
            background: #f8f9fa;
        }
        .index-name {
            font-size: 18px;
            color: #606266;
            margin-bottom: 5px;
        }
        .index-price {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 3px;
            color: #2c3e50;
        }
        .index-change {
            font-size: 18px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
        }
        .positive { color: #f56c6c; }  /* 红色表示涨 */
        .negative { color: #67c23a; }  /* 绿色表示跌 */


        /* 标题样式 */
        .header { text-align: center; margin-bottom: 20px; padding: 15px; position: relative; }
        .header h1 { margin-bottom: 5px; font-size: 28px; color: #2c3e50; }
        .update-time { color: #7f8c8d; font-size: 14px; }

        /* 标签栏样式 */
        .pair-tabs {
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        /* 新增：编辑按钮样式 */
        .edit-note {
            cursor: pointer;
            margin-left: 4px;
            opacity: 0.6;
            font-size: 14px;
            line-height: 1;
        }
        .edit-note:hover {
            opacity: 1;
            color: #409EFF;
        }
        .pair-tab {
            padding: 8px 16px;
            background: #ecf5ff;
            border: 1px solid #b3d8ff;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            color: #409eff;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            user-select: none;
        }
        .pair-tab.active {
            background: #409eff;
            color: white;
            border-color: #409eff;
        }
        .pair-tab .delete-pair {
            cursor: pointer;
            font-weight: bold;
            opacity: 0.6;
            margin-left: 4px;
            font-size: 16px;
            line-height: 1;
        }
        .pair-tab .delete-pair:hover {
            opacity: 1;
        }
        #addPairBtn {
            padding: 6px 16px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        #addPairBtn:hover {
            background: #66b1ff;
        }

        /* 添加套利对表单（默认隐藏） */
        #addPairSection {
            display: none;
        }
        #addPairSection .config-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }
        #addPairSection .config-item {
            flex: 1;
            min-width: 200px;
            text-align: center;
        }
        #addPairSection .config-item label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 20px;
        }
        #addPairSection .config-item input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 20px;
            transition: border-color 0.3s;
            text-align: center;
        }
        #addPairSection .config-item input:focus {
            border-color: #409eff;
            outline: none;
            box-shadow: 0 0 0 2px rgba(64, 158, 255, 0.1);
        }
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .save-btn {
            background: #409eff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: background 0.3s;
            display: block;
            margin: 10px auto 0;
            width: 200px;
        }
        .save-btn:hover { background: #66b1ff; }
        .save-btn.cancel {
            background: #909399;
        }
        .save-btn.cancel:hover { background: #a6a9ad; }

        /* 股票信息区域 */
        .stocks-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .stock-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            text-align: center;
            display: flex;
            flex-direction: column;
        }
        .stock-header {
            margin-bottom: 15px;
        }
        .stock-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #2c3e50;
        }
        .stock-price {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .stock-change {
            font-size: 24px;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 4px;
            display: inline-block;
        }

        /* 股票走势图容器 */
        .stock-chart {
            height: 150px;
            margin-top: 15px;
            position: relative;
        }
        .stock-chart-canvas {
            width: 100%;
            height: 100%;
        }

        /* 图表区域 */
        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        .chart-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #2c3e50;
            text-align: center;
        }
        .chart-canvas {
            height: 350px;
            width: 100%;
        }

        /* 统计信息区域 */
        .stats-container {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .stat-item {
            text-align: center;
            flex: 1;
        }
        .stat-label {
            font-size: 14px;
            color: #606266;
            margin-bottom: 5px;
        }
        .stat-value {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .stat-time {
            font-size: 14px;
            color: #7f8c8d;
        }

        /* 手机专用样式 */
        .mobile-view {
            display: none;
        }

        @media (max-width: 480px) {
            .desktop-view {
                display: none;
            }
            .mobile-view {
                display: block;
            }

            .config-row {
                flex-direction: column;
                gap: 10px;
            }

            .stocks-section {
                gap: 10px;
            }

            .chart-canvas {
                height: 250px;
            }

            .stats-container {
                flex-direction: column;
                gap: 8px;
            }

            .stock-chart {
                height: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题区域 -->
        <div class="header">
            <h1>股票价差监控系统</h1>
            <div class="update-time">本地时间: <span id="updateTime">--:--:--</span></div>
            <button id="logoutButton" class="logout-btn">登出</button>
        </div>

        <!-- 大盘指数区域 -->
        <div class="index-section">
            <div class="index-item" data-code="sh000001">
                <div class="index-name">上证指数</div>
                <div class="index-price">--</div>
                <div class="index-change">--%</div>
            </div>
            <div class="index-item" data-code="sz399001">
                <div class="index-name">深证成指</div>
                <div class="index-price">--</div>
                <div class="index-change">--%</div>
            </div>
            <div class="index-item" data-code="sz399006">
                <div class="index-name">创业板指</div>
                <div class="index-price">--</div>
                <div class="index-change">--%</div>
            </div>
            <div class="index-item" data-code="sh000688">
                <div class="index-name">科创50</div>
                <div class="index-price">--</div>
                <div class="index-change">--%</div>
            </div>
            <div class="index-item" data-code="sh000016">
                <div class="index-name">上证50</div>
                <div class="index-price">--</div>
                <div class="index-change">--%</div>
            </div>
            <div class="index-item" data-code="sh000300">
                <div class="index-name">沪深300</div>
                <div class="index-price">--</div>
                <div class="index-change">--%</div>
            </div>
            <div class="index-item" data-code="sh000905">
                <div class="index-name">中证500</div>
                <div class="index-price">--</div>
                <div class="index-change">--%</div>
            </div>
            <div class="index-item" data-code="sh000852">
                <div class="index-name">中证1000</div>
                <div class="index-price">--</div>
                <div class="index-change">--%</div>
            </div>
        </div>

        <!-- 套利对标签栏 -->
        <div class="pair-tabs">
            <div id="pairTabsContainer" style="display:flex; flex-wrap:wrap; gap:8px;"></div>
            <button id="addPairBtn">+ 新建套利对</button>
        </div>

        <!-- 添加套利对表单（默认隐藏） -->
        <div id="addPairSection" class="config-section">
            <div class="config-row">
                <div class="config-item">
                    <label for="newStock1">股票1代码</label>
                    <input type="text" id="newStock1" placeholder="输入股票代码">
                </div>
                <div class="config-item">
                    <label for="newStock2">股票2代码</label>
                    <input type="text" id="newStock2" placeholder="输入股票代码">
                </div>
            </div>
            <div class="btn-group">
                <button id="confirmAddPair" class="save-btn" style="width:auto; padding:10px 40px;">确认添加</button>
                <button id="cancelAddPair" class="save-btn cancel" style="width:auto; padding:10px 40px;">取消</button>
            </div>
        </div>

        <!-- 股票信息区域 -->
        <div class="stocks-section">
            <div class="stock-card">
                <div class="stock-header">
                    <div id="stock1-name" class="stock-name">股票1: 未设置</div>
                    <div id="stock1-price" class="stock-price">¥--</div>
                    <div id="stock1-change" class="stock-change">--%</div>
                </div>
                <div class="stock-chart">
                    <div id="stock1-chart" class="stock-chart-canvas"></div>
                </div>
            </div>
            <div class="stock-card">
                <div class="stock-header">
                    <div id="stock2-name" class="stock-name">股票2: 未设置</div>
                    <div id="stock2-price" class="stock-price">¥--</div>
                    <div id="stock2-change" class="stock-change">--%</div>
                </div>
                <div class="stock-chart">
                    <div id="stock2-chart" class="stock-chart-canvas"></div>
                </div>
            </div>
        </div>

        <!-- 当日价差图表 -->
        <div class="chart-container">
            <div class="chart-title">当日价差走势</div>
            <div id="intradayChart" class="chart-canvas"></div>
            <div class="stats-container">
                <div class="stat-item">
                    <div class="stat-label">当前价差</div>
                    <div id="intraday-current-value" class="stat-value">--%</div>
                    <div id="intraday-current-time" class="stat-time">--:--</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">最大价差</div>
                    <div id="intraday-max-value" class="stat-value">--%</div>
                    <div id="intraday-max-time" class="stat-time">--:--</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">最小价差</div>
                    <div id="intraday-min-value" class="stat-value">--%</div>
                    <div id="intraday-min-time" class="stat-time">--:--</div>
                </div>
            </div>
        </div>

        <!-- 五日价差图表 -->
        <div class="chart-container">
            <div class="chart-title">五日价差走势</div>
            <div id="fiveDayChart" class="chart-canvas"></div>
            <div class="stats-container">
                <div class="stat-item">
                    <div class="stat-label">当前价差</div>
                    <div id="fiveDay-current-value" class="stat-value">--%</div>
                    <div id="fiveDay-current-time" class="stat-time">--:--</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">最大价差</div>
                    <div id="fiveDay-max-value" class="stat-value">--%</div>
                    <div id="fiveDay-max-date" class="stat-time">--:--</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">最小价差</div>
                    <div id="fiveDay-min-value" class="stat-value">--%</div>
                    <div id="fiveDay-min-date" class="stat-time">--:--</div>
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="main.js"></script>
</body>
</html>
